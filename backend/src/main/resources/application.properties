spring.application.name=stockarena-backend

# Server Configuration
server.port=8080

# Database Configuration (H2 In-Memory)
# MySQL Configuration
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stockCheck}?createDatabaseIfNotExist=true
# spring.datasource.username=${DB_USER:root}
# spring.datasource.password=${DB_PASSWORD:admin@123}
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}


#spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false
#spring.datasource.username=${DB_USER}
#spring.datasource.password=${DB_PASSWORD}

# Hibernate MySQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update


# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# OpenAI Configuration
# openai.api.key=${OPENAI_API_KEY:sk-placeholder}

openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=StockArena-
